<section class="card v2-command-bar">
  <div>
    <div class="eyebrow">Operations</div>
    <h2>{{ page_title or 'Command dashboard' }}</h2>
    <div class="sub">Desktop-first operator overview with the camera wall in charge, alerts close at hand, and playback one click away.</div>
  </div>
  <div class="row" style="justify-content:flex-end">
    <span class="pill">{{ enabled_cameras }} live cameras</span>
    <span class="pill {% if unacked_alerts %}bad{% endif %}">{{ unacked_alerts }} unacked alerts</span>
    <a class="btn primary" href="/live">Open live wall</a>
    <a class="btn" href="/alerts">Open alerts</a>
    <a class="btn ghost" href="/ui/scan">Scan LAN</a>
  </div>
</section>
