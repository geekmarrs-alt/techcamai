<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}TECHCAMAI{% endblock %}</title>
    <style>
      :root{
        --bg: #07111f;
        --bg2: #0b1629;
        --panel: rgba(10, 19, 37, 0.78);
        --panel-soft: rgba(255,255,255,.05);
        --text: rgba(245,248,255,.96);
        --muted: rgba(200,214,236,.72);
        --faint: rgba(200,214,236,.48);
        --border: rgba(130,164,220,.16);
        --accent: #53b6ff;
        --accent2: #35e0b8;
        --accent3: #7c5cff;
        --danger: #ff5b76;
        --ok: #37d39a;
        --warn: #f8bf4c;
        --shadow: 0 22px 60px rgba(0,0,0,.35);
        --radius: 22px;
      }
      *{ box-sizing:border-box; }
      html, body{ min-height:100%; }
      body{
        margin:0;
        color:var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
        background:
          radial-gradient(1000px 600px at 10% -10%, rgba(83,182,255,.18), transparent 58%),
          radial-gradient(900px 700px at 100% 0%, rgba(124,92,255,.16), transparent 52%),
          radial-gradient(900px 600px at 50% 120%, rgba(53,224,184,.10), transparent 60%),
          linear-gradient(180deg, var(--bg), var(--bg2));
      }
      a{ color:inherit; text-decoration:none; }
      button, input, select{ font:inherit; }

      .app{ display:grid; grid-template-columns: 280px 1fr; min-height:100vh; }
      .side{
        position:sticky;
        top:0;
        height:100vh;
        border-right:1px solid var(--border);
        padding:22px 18px;
        background: linear-gradient(180deg, rgba(8,17,33,.92), rgba(10,19,37,.84));
        backdrop-filter: blur(18px);
      }
      .brand{
        display:flex;
        flex-direction:column;
        align-items:center;
        gap:10px;
        margin-bottom:20px;
      }
      .brand-logo{
        display:grid;
        place-items:center;
        min-height:164px;
      }
      .brand-logo img{
        width:156px;
        height:156px;
        object-fit:contain;
        filter: drop-shadow(0 18px 32px rgba(0,0,0,.46));
      }
      .brand-text{ text-align:center; }
      .brand-title{
        margin:0;
        font-size:20px;
        font-weight:800;
        letter-spacing:.14em;
      }
      .brand-sub{
        margin-top:6px;
        color:var(--muted);
        font-size:12px;
        letter-spacing:.08em;
        text-transform:uppercase;
      }

      .nav-section{
        margin-top:18px;
        margin-bottom:8px;
        color:var(--faint);
        font-size:11px;
        font-weight:700;
        letter-spacing:.14em;
        text-transform:uppercase;
      }
      .nav{ display:flex; flex-direction:column; gap:8px; }
      .nav a{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:8px;
        padding:12px 14px;
        border:1px solid transparent;
        border-radius:16px;
        color:var(--muted);
        background: transparent;
        transition: .18s ease;
      }
      .nav a:hover{
        background: rgba(255,255,255,.04);
        border-color: rgba(130,164,220,.12);
        color:var(--text);
        transform: translateX(2px);
      }
      .nav a.active{
        color:var(--text);
        border-color: rgba(83,182,255,.18);
        background: linear-gradient(135deg, rgba(83,182,255,.14), rgba(124,92,255,.10));
        box-shadow: inset 0 1px 0 rgba(255,255,255,.04);
      }
      .nav small{ color:var(--faint); font-size:11px; }

      .side-card{
        margin-top:18px;
        padding:14px;
        border-radius:18px;
        background: rgba(255,255,255,.04);
        border:1px solid var(--border);
      }
      .chiprow{ display:flex; flex-wrap:wrap; gap:8px; margin-top:10px; }

      .main{ padding:26px 26px 42px; }
      .topbar{
        display:flex;
        align-items:flex-start;
        justify-content:space-between;
        gap:16px;
        margin-bottom:18px;
      }
      .topbar h2{ margin:0; font-size:24px; letter-spacing:-.02em; }
      .sub{ color:var(--muted); font-size:13px; line-height:1.45; }
      .eyebrow{
        color:var(--faint);
        font-size:11px;
        font-weight:700;
        letter-spacing:.16em;
        text-transform:uppercase;
      }

      .hero{ display:grid; grid-template-columns: 1.2fr .8fr; gap:18px; margin-bottom:18px; }
      .hero-panel, .card{
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 18px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }
      .hero-panel{ position:relative; overflow:hidden; }
      .hero-panel:before{
        content:"";
        position:absolute;
        inset:0;
        background: linear-gradient(135deg, rgba(83,182,255,.10), transparent 45%, rgba(124,92,255,.08));
        pointer-events:none;
      }
      .hero-brand{
        display:flex;
        flex-direction:column;
        align-items:center;
        justify-content:center;
        text-align:center;
        min-height:260px;
      }
      .hero-brand img{
        width:220px;
        max-width:100%;
        height:auto;
        object-fit:contain;
        filter: drop-shadow(0 24px 40px rgba(0,0,0,.35));
      }
      .hero-brand h1{ margin:14px 0 6px; font-size:34px; line-height:1; letter-spacing:.14em; }
      .hero-brand p{ margin:0; max-width:560px; color:var(--muted); }

      .stats{ display:grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap:14px; margin-bottom:18px; }
      .stat{
        padding:16px;
        border-radius:20px;
        background: var(--panel);
        border:1px solid var(--border);
        box-shadow: var(--shadow);
      }
      .stat .label{ color:var(--faint); font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; }
      .stat .value{ margin-top:10px; font-size:28px; font-weight:800; letter-spacing:-.03em; }
      .stat .hint{ margin-top:6px; color:var(--muted); font-size:12px; }

      .grid{ display:grid; gap:16px; grid-template-columns: 1.35fr .95fr; }
      .card h3{ margin:0 0 10px; font-size:14px; letter-spacing:.06em; text-transform:uppercase; color:var(--faint); }

      .btn{
        display:inline-flex; align-items:center; justify-content:center; gap:8px;
        padding:10px 14px;
        border-radius: 14px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.05);
        color:var(--text);
        cursor:pointer;
        transition:.18s ease;
      }
      .btn:hover{ transform:translateY(-1px); border-color: rgba(130,164,220,.24); }
      .btn.primary{ background: linear-gradient(135deg, rgba(83,182,255,.92), rgba(124,92,255,.86)); border-color: transparent; }
      .btn.ghost{ background: transparent; }
      .btn.danger{ background: rgba(255,91,118,.12); border-color: rgba(255,91,118,.22); }

      .pill{
        display:inline-flex;
        align-items:center;
        gap:6px;
        font-size:12px;
        padding:5px 10px;
        border-radius:999px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.05);
        color: var(--muted);
      }
      .pill.ok{ color: #052e16; background: rgba(55,211,154,.90); border-color: transparent; }
      .pill.bad{ color: white; background: rgba(255,91,118,.72); border-color: transparent; }
      .pill.warn{ color:#271800; background: rgba(248,191,76,.88); border-color: transparent; }

      table{ width:100%; border-collapse: collapse; }
      th, td{ text-align:left; padding:12px 8px; border-bottom:1px solid rgba(255,255,255,.06); vertical-align:top; }
      th{ color: var(--faint); font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; }

      input, select.select{
        width:100%;
        padding:11px 13px;
        border-radius: 14px;
        border:1px solid var(--border);
        background: rgba(0,0,0,.24);
        color: var(--text);
        outline:none;
      }
      input::placeholder{ color: rgba(255,255,255,.35); }

      .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
      .grid1{ display:grid; gap:12px; grid-template-columns: 1fr; }
      .right{ text-align:right; }
      .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }

      .quick-grid{ display:grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap:12px; }
      .quick-card, .camera-item, .timeline-row{
        display:block;
        padding:14px;
        border-radius:18px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.04);
      }
      .quick-card strong, .camera-item strong{ display:block; margin-bottom:6px; }
      .camera-grid{ display:grid; gap:12px; }
      .timeline-list{ display:grid; gap:12px; }

      .tilegrid{ display:grid; gap:14px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .tile{ background: var(--panel); border:1px solid var(--border); border-radius:20px; padding:14px; box-shadow: var(--shadow); }
      .tilehdr{ display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
      .tilename{ font-weight:700; letter-spacing:.01em; }
      .tileimgwrap{ display:block; margin-top:12px; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.10); background: rgba(0,0,0,.25); }
      .tileimg{ width:100%; height:320px; object-fit:cover; display:block; }
      .tileft{ display:flex; gap:10px; margin-top:10px; }

      .alertlist{ margin-top:12px; display:flex; flex-direction:column; gap:12px; }
      .alertrow{ display:grid; grid-template-columns: 220px 1fr; gap:12px; background: var(--panel); border:1px solid var(--border); border-radius:20px; padding:12px; box-shadow: var(--shadow); }
      .alertthumb{ border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.10); background: rgba(0,0,0,.25); display:grid; place-items:center; min-height:180px; }
      .alertthumb img{ width:100%; height:180px; object-fit:cover; display:block; }
      .alertmeta{ display:grid; gap:10px; }

      .activity-strip{ display:grid; grid-template-columns: repeat(8, minmax(0,1fr)); gap:8px; margin-top:14px; }
      .activity-strip span{
        display:block;
        height:54px;
        border-radius:14px;
        background: linear-gradient(180deg, rgba(83,182,255,.18), rgba(124,92,255,.08));
        border:1px solid rgba(83,182,255,.10);
      }

      img.preview{ max-width:100%; border-radius:16px; border:1px solid rgba(255,255,255,.10); }

      @media (max-width: 1160px){
        .stats{ grid-template-columns: repeat(2, minmax(0,1fr)); }
        .hero{ grid-template-columns: 1fr; }
        .grid{ grid-template-columns:1fr; }
      }
      @media (max-width: 980px){
        .app{ grid-template-columns: 1fr; }
        .side{ position:static; height:auto; border-right:none; border-bottom:1px solid var(--border); }
      }
      @media (max-width: 900px){
        .alertrow{ grid-template-columns: 1fr; }
        .tilegrid{ grid-template-columns: 1fr; }
      }
      @media (max-width: 640px){
        .main{ padding:18px 16px 34px; }
        .stats{ grid-template-columns: 1fr; }
        .quick-grid{ grid-template-columns: 1fr; }
        .hero-brand h1{ font-size:28px; }
        .hero-brand img{ width:170px; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <div class="brand">
          <div class="brand-logo" aria-label="TECHCAMAI logo">
            <img src="/static/techcamai-icon.svg" alt="TECHCAMAI" />
          </div>
          <div class="brand-text">
            <div class="brand-title">TECHCAMAI</div>
            <div class="brand-sub">Operator console</div>
          </div>
        </div>

        <div class="nav-section">Workspace</div>
        <nav class="nav">
          <a href="/" class="{% if active=='overview' %}active{% endif %}"><span>Overview</span><small>home</small></a>
          <a href="/live" class="{% if active=='live' %}active{% endif %}"><span>Live</span><small>wall</small></a>
          <a href="/alerts" class="{% if active=='alerts' %}active{% endif %}"><span>Alerts</span><small>inbox</small></a>
          <a href="/timeline" class="{% if active=='timeline' %}active{% endif %}"><span>Timeline</span><small>day view</small></a>
          <a href="/cameras/manage" class="{% if active=='cameras' %}active{% endif %}"><span>Cameras</span><small>manage</small></a>
          <a href="/ui/scan" class="{% if active=='scan' %}active{% endif %}"><span>LAN scan</span><small>discover</small></a>
          <a href="/ui/add" class="{% if active=='add' %}active{% endif %}"><span>Add / test</span><small>camera</small></a>
        </nav>

        <div class="side-card">
          <div class="eyebrow">MVP capability</div>
          <div class="chiprow">
            <span class="pill">LAN scan</span>
            <span class="pill">Digest auth</span>
            <span class="pill">Snapshot wall</span>
            <span class="pill">Alert inbox</span>
          </div>
        </div>
      </aside>

      <main class="main">
        {% block content %}{% endblock %}
      </main>

      {% if poll|default(0) %}
        <script>
          window.TECHCAMAI_POLL = { enabled: true, everyMs: 2500, endpoint: '/api/alerts/latest' };
        </script>
        <script src="/static/poll.js"></script>
      {% endif %}
    </div>
  </body>
</html>
