<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>{% block title %}TECHCAMAI{% endblock %}</title>
    <style>
      :root{
        --bg: #0b1020;
        --panel: rgba(255,255,255,.06);
        --panel2: rgba(255,255,255,.09);
        --text: rgba(255,255,255,.92);
        --muted: rgba(255,255,255,.68);
        --border: rgba(255,255,255,.10);
        --accent: #7c5cff;
        --accent2: #2dd4bf;
        --danger: #ff4d6d;
        --ok: #34d399;
        --shadow: 0 10px 30px rgba(0,0,0,.35);
      }
      *{ box-sizing:border-box; }
      body{
        margin:0;
        color:var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, Noto Sans, Arial;
        background:
          radial-gradient(1200px 600px at 20% -10%, rgba(124,92,255,.40), transparent 60%),
          radial-gradient(900px 600px at 90% 10%, rgba(45,212,191,.25), transparent 55%),
          radial-gradient(900px 600px at 60% 110%, rgba(255,77,109,.15), transparent 60%),
          var(--bg);
        min-height:100vh;
      }
      a{ color: inherit; text-decoration:none; }
      .app{ display:grid; grid-template-columns: 260px 1fr; min-height:100vh; }
      .side{
        border-right:1px solid var(--border);
        padding:18px;
        background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
        backdrop-filter: blur(10px);
      }
      .brand{ display:flex; align-items:center; justify-content:center; margin-bottom:18px; }
      .logo{
        width:148px; height:148px;
        background: transparent;
        box-shadow: none;
        display:grid; place-items:center;
      }

      .nav{ display:flex; flex-direction:column; gap:8px; margin-top:10px; }
      .nav a{
        padding:10px 12px;
        border:1px solid transparent;
        border-radius:14px;
        background: transparent;
        color:var(--muted);
      }
      .nav a.active, .nav a:hover{
        background: rgba(255,255,255,.06);
        border-color: var(--border);
        color:var(--text);
      }

      .main{ padding:22px 22px 40px; }
      .topbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
      .topbar h2{ margin:0; font-size:18px; }
      .sub{ color:var(--muted); font-size:13px; }

      .grid{ display:grid; gap:14px; grid-template-columns: 1.4fr .9fr; }
      @media (max-width: 960px){ .app{ grid-template-columns: 1fr; } .side{ border-right:none; border-bottom:1px solid var(--border);} .grid{ grid-template-columns:1fr; } }

      .card{
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 18px;
        padding: 14px;
        box-shadow: var(--shadow);
        backdrop-filter: blur(10px);
      }
      .card h3{ margin:0 0 10px; font-size:14px; letter-spacing:.04em; }

      .btn{
        display:inline-flex; align-items:center; gap:8px;
        padding:10px 12px;
        border-radius: 14px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.06);
        color:var(--text);
        cursor:pointer;
      }
      .btn.primary{
        background: linear-gradient(135deg, rgba(124,92,255,.95), rgba(45,212,191,.70));
        border-color: transparent;
      }
      .btn.ghost{ background: transparent; }
      .btn:active{ transform: translateY(1px); }

      .pill{
        display:inline-block;
        font-size:12px;
        padding:3px 9px;
        border-radius:999px;
        border:1px solid var(--border);
        background: rgba(255,255,255,.06);
        color: var(--muted);
      }
      .pill.ok{ color: #052e16; background: rgba(52,211,153,.85); border-color: transparent; }
      .pill.bad{ color: white; background: rgba(255,77,109,.60); border-color: transparent; }

      table{ width:100%; border-collapse: collapse; }
      th, td{ text-align:left; padding:10px 8px; border-bottom:1px solid rgba(255,255,255,.06); }
      th{ color: var(--muted); font-size:12px; font-weight:600; }

      input{
        width:100%;
        padding:10px 12px;
        border-radius: 14px;
        border:1px solid var(--border);
        background: rgba(0,0,0,.25);
        color: var(--text);
        outline: none;
      }
      input::placeholder{ color: rgba(255,255,255,.35); }
      select.select{
        width:100%;
        padding:10px 12px;
        border-radius: 14px;
        border:1px solid var(--border);
        background: rgba(0,0,0,.25);
        color: var(--text);
        outline:none;
      }

      .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
      .grid1{ display:grid; gap:10px; grid-template-columns: 1fr; }

      /* Live wall */
      .tilegrid{ display:grid; gap:14px; grid-template-columns: repeat(2, minmax(0, 1fr)); }
      @media (max-width: 1100px){ .tilegrid{ grid-template-columns: 1fr; } }
      .tile{ background: var(--panel); border:1px solid var(--border); border-radius:18px; padding:12px; box-shadow: var(--shadow); }
      .tilehdr{ display:flex; justify-content:space-between; gap:10px; align-items:flex-start; }
      .tilename{ font-weight:700; letter-spacing:.01em; }
      .tileimgwrap{ display:block; margin-top:10px; border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.10); background: rgba(0,0,0,.25); }
      .tileimg{ width:100%; height:320px; object-fit:cover; display:block; }
      .tileft{ display:flex; gap:10px; margin-top:10px; }

      /* Alerts */
      .alertlist{ margin-top:12px; display:flex; flex-direction:column; gap:12px; }
      .alertrow{ display:grid; grid-template-columns: 220px 1fr; gap:12px; background: var(--panel); border:1px solid var(--border); border-radius:18px; padding:12px; box-shadow: var(--shadow); }
      @media (max-width: 900px){ .alertrow{ grid-template-columns: 1fr; } }
      .alertthumb{ border-radius:16px; overflow:hidden; border:1px solid rgba(255,255,255,.10); background: rgba(0,0,0,.25); display:grid; place-items:center; }
      .alertthumb img{ width:100%; height:180px; object-fit:cover; display:block; }

      img.preview{ max-width:100%; border-radius:16px; border:1px solid rgba(255,255,255,.10); }
      .right{ text-align:right; }
      .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      img.preview{ max-width:100%; border-radius:16px; border:1px solid rgba(255,255,255,.10); }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="side">
        <div class="brand">
          <div class="logo" aria-label="TECHCAMAI logo">
            <img src="/static/techcamai-icon.svg" alt="TECHCAMAI" style="width:132px;height:132px;filter: drop-shadow(0 18px 26px rgba(0,0,0,.50));" />
          </div>
        </div>

        <nav class="nav">
          <a href="/" class="{% if active=='overview' %}active{% endif %}">Overview</a>
          <a href="/live" class="{% if active=='live' %}active{% endif %}">Live</a>
          <a href="/alerts" class="{% if active=='alerts' %}active{% endif %}">Alerts</a>
          <a href="/timeline" class="{% if active=='timeline' %}active{% endif %}">Timeline</a>
          <a href="/cameras/manage" class="{% if active=='cameras' %}active{% endif %}">Cameras</a>
          <a href="/ui/scan" class="{% if active=='scan' %}active{% endif %}">LAN scan</a>
          <a href="/ui/add?ip=192.168.0.84" class="{% if active=='add' %}active{% endif %}">Quick add/test</a>
        </nav>

        <div style="margin-top:16px" class="card">
          <div class="sub">MVP mode</div>
          <div style="margin-top:8px" class="pill">LAN scan</div>
          <div style="margin-top:8px" class="pill">Hikvision digest</div>
        </div>
      </aside>

      <main class="main">
        {% block content %}{% endblock %}
      </main>

      {% if poll|default(0) %}
        <script>
          window.TECHCAMAI_POLL = { enabled: true, everyMs: 2500, endpoint: '/api/alerts/latest' };
        </script>
        <script src="/static/poll.js"></script>
      {% endif %}
    </div>
  </body>
</html>
